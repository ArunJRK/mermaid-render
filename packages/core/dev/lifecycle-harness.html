<!DOCTYPE html>
<html>
<head>
  <title>mermaid-render lifecycle harness</title>
  <style>
    html, body { margin: 0; padding: 0; background: #111827; color: #e5e7eb; font-family: Inter, system-ui, sans-serif; }
    body { padding: 16px; }
    .row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .frame { background: #0b1220; border: 1px solid #374151; border-radius: 8px; padding: 8px; }
    canvas { display: block; width: 100%; height: 240px; background: #111827; }
    pre { margin: 0 0 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <pre id="status">idle</pre>
  <div class="row">
    <div class="frame"><canvas id="canvas-a" width="480" height="240"></canvas></div>
    <div class="frame"><canvas id="canvas-b" width="480" height="240"></canvas></div>
  </div>
  <script type="module" src="./lifecycle-harness.ts"></script>
</body>
</html>
