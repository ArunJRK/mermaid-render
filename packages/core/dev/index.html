<!DOCTYPE html>
<html>
<head>
  <title>mermaid-render dev</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0d1117; font-family: Inter, system-ui, sans-serif; }
    #canvas-wrap { position: absolute; top: 36px; left: 224px; right: 0; bottom: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    #breadcrumb {
      position: fixed; top: 0; left: 0; right: 0; height: 36px; z-index: 20;
      display: flex; align-items: center; padding: 0 16px;
      background: #0d1117; border-bottom: 1px solid #30363d;
      font-size: 13px; color: #8b949e;
      transition: background 0.3s, border-color 0.3s;
    }
    #breadcrumb .segment { cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
    #breadcrumb .segment:hover { background: rgba(255, 255, 255, 0.08); }
    #breadcrumb .segment.current { font-weight: 600; }
    #breadcrumb .separator { margin: 0 2px; opacity: 0.4; user-select: none; }
    #breadcrumb .hint { margin-left: auto; font-size: 11px; opacity: 0.5; }
    #breadcrumb .hint kbd {
      display: inline-block; padding: 1px 5px; border: 1px solid #484f58;
      border-radius: 3px; background: #161b22; font-family: inherit; font-size: 11px;
    }

    #toolbar {
      position: fixed; top: 36px; left: 0; bottom: 0; width: 199px; z-index: 10;
      display: flex; flex-direction: column; gap: 14px;
      padding: 16px 12px;
      background: rgba(13, 17, 23, 0.92);
      border-right: 1px solid #30363d;
      backdrop-filter: blur(8px);
    }
    #controls, #files { display: grid; grid-template-columns: 1fr; gap: 6px; }
    #toolbar button {
      padding: 5px 12px; border: 1px solid #30363d; border-radius: 6px;
      background: #161b22; color: #8b949e; font-size: 12px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      text-align: left;
    }
    #toolbar button:hover { background: #21262d; color: #e6edf3; }
    #toolbar label { color: #484f58; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    #status {
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #161b22;
      color: #8b949e;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    #status[data-level="error"] { border-color: #f85149; color: #ffb4ad; }
    #status[data-level="warn"] { border-color: #d29922; color: #f2cc60; }

    @media (max-width: 700px) {
      #breadcrumb { padding: 0 12px; }
      #breadcrumb .hint { display: none; }
      #canvas-wrap { top: 230px; left: 0; }
      #toolbar {
        top: 36px; right: 0; bottom: auto; width: auto;
        padding: 12px;
        border-right: 0;
        border-bottom: 1px solid #30363d;
      }
      #controls, #files { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      #toolbar button { padding: 6px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="breadcrumb">
    <span class="segment current">Root</span>
  </div>
  <div id="toolbar">
    <div>
      <label>Layout</label>
      <div id="controls">
        <button data-layout="narrative">Narrative</button>
        <button data-layout="map">Map</button>
        <button data-layout="blueprint">Blueprint</button>
        <button data-layout="breath">Breath</button>
        <button data-layout="radial">Radial</button>
        <button data-layout="mosaic">Mosaic</button>
      </div>
    </div>
    <div>
      <label>Files</label>
      <div id="files"></div>
    </div>
    <div id="status" aria-live="polite">Ready</div>
  </div>
  <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
