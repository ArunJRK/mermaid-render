name: Core Verify

on:
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'README.md'
      - 'docs/**'
      - 'examples/**'
      - 'packages/core/**'
      - '.github/workflows/core.yml'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'README.md'
      - 'docs/**'
      - 'examples/**'
      - 'packages/core/**'
      - '.github/workflows/core.yml'

jobs:
  verify-core:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @mermaid-render/core exec playwright install --with-deps chromium

      - name: Verify core
        run: pnpm verify:core
